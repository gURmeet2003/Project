<!DOCTYPE html>
<html>
<head>
    <title>Vendor Service</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            text-align:center;
            padding-top:80px;
        }

        .container{
            width:70%;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color:#2c3e50;
        }

        p{
            color:#555;
            font-size:18px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }

        img{
            width:120px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<div class="container">

    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <h1>Vendor Management Service</h1>

    <p>
        Welcome to Vendor Service API.
    </p>

    <p>
        This application manages vendor information and provides REST APIs
        for Vendor Management operations.
    </p>

    <a class="btn" href="/vendor/controller/getVendors">
        View Vendors
    </a>

</div>

</body>
</html>
